services:
  userbot:
    build: .
    container_name: telegram-userbot-parser
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
      - ./Данные аккаунта Казахстан:/app/Данные аккаунта Казахстан
      - ./Прокси.txt:/app/Прокси.txt:ro
      - ./userbot.session:/app/userbot.session
    command: ["python", "main.py"]
